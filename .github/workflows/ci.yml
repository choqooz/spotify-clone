name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend:
    name: Backend — test + syntax check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable corepack (pnpm)
        run: corepack enable

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "store=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: pnpm-backend-${{ runner.os }}-${{ hashFiles('backend/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-backend-${{ runner.os }}-

      - name: Install backend dependencies
        run: pnpm install
        working-directory: backend

      - name: Run tests (vitest)
        run: pnpm test
        working-directory: backend

      - name: Syntax check (node --check)
        run: node --check src/index.js
        working-directory: backend

  frontend:
    name: Frontend — typecheck + lint + build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable corepack (pnpm)
        run: corepack enable

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "store=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: pnpm-frontend-${{ runner.os }}-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-frontend-${{ runner.os }}-

      - name: Install frontend dependencies
        run: pnpm install
        working-directory: frontend

      - name: Type check (tsc -b)
        run: npx tsc -b
        working-directory: frontend

      - name: Lint (eslint)
        run: pnpm lint
        working-directory: frontend

      - name: Build (vite)
        run: pnpm build
        working-directory: frontend
        env:
          VITE_CLERK_PUBLISHABLE_KEY: pk_test_placeholder
