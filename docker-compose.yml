services:
  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "${PORT:-5000}:5000"
    environment:
      - NODE_ENV=production
    env_file:
      - backend/.env
    volumes:
      - downloads:/app/downloads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

volumes:
  downloads:
